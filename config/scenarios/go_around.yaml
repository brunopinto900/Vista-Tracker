base: ../base.yaml

# Scenario: go_around
# Person approaches a large obstacle, veers left around it, resumes course.

drone_init:
  x: -8.0
  y:  0.0
  z:  3.0

sim:
  T: 50.0

controller:
  kp_pos:           1.6
  kp_vel:           5.0
  ki_vel:           0.2
  desired_distance: 4.0
  attitude_kp:      6.680
  yaw_kp:           0.287

target_trajectory:
  type: person
  max_accel:         1.0
  max_speed:         2.0
  max_lateral_accel: 4.0
  loop: false
  waypoints:
    - pos: [-5.0,  0.0, 0.0]
      speed: 2.0
    - pos: [ 0.0,  0.0, 0.0]
      speed: 1.0
    - pos: [ 2.0,  0.0, 0.0]    # slow — obstacle ahead
      speed: 0.8
    - pos: [ 3.0,  3.0, 0.0]    # veer left around obstacle A
      speed: 0.8
    - pos: [ 5.0,  3.0, 0.0]
      speed: 1.0
    - pos: [ 7.0,  0.0, 0.0]    # resume course
      speed: 1.5
    - pos: [14.0,  0.0, 0.0]
      speed: 2.0
    - pos: [17.0,  0.0, 0.0]    # slow — obstacle B ahead
      speed: 0.8
    - pos: [18.0, -3.0, 0.0]    # veer right around obstacle B
      speed: 0.8
    - pos: [21.0, -3.0, 0.0]
      speed: 1.0
    - pos: [23.0,  0.0, 0.0]    # resume course
      speed: 1.5
    - pos: [32.0,  0.0, 0.0]
      speed: 2.0

world:
  grid:
    x_min: -10.0
    x_max:  36.0
    y_min:  -8.0
    y_max:   8.0
  obstacles:
    - x:  4.0
      y:  0.0
      size: 1.5
    - x: 20.0
      y:  0.0
      size: 1.5
