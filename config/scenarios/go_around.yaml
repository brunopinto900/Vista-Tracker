base: ../base.yaml

# Scenario: go_around
# Person approaches a large obstacle, veers left around it, resumes course.

drone_init:
  x: -6.0
  y:  0.0
  z:  2.0

sim:
  T: 20.0

controller:
  kp:               6.0    # ITAE+smoothing-optimised for sinusoidal tracking
  ki:               0.0
  kd:               3.0
  desired_distance: 4.0
  attitude_kp:      20.0    # inner loop gain (rad/s per rad); smoothing pulled this down from 16.5

target_trajectory:
  type: person
  max_accel:         1.0
  max_speed:         2.0
  max_lateral_accel: 4.0
  loop: false
  waypoints:
    - pos: [0.0,  0.0, 0.0]
      speed: 1.0
    - pos: [2.0,  0.0, 0.0]
      speed: 0.8
    - pos: [3.0,  3.0, 0.0]
      speed: 0.8
    - pos: [5.0,  3.0, 0.0]
      speed: 1.0
    - pos: [7.0,  0.0, 0.0]
      speed: 1.5
    - pos: [14.0, 0.0, 0.0]
      speed: 2.0

world:
  grid:
    x_min: -8.0
    x_max:  16.0
    y_min:  -4.0
    y_max:   6.0
  obstacles:
    - x: 4.0
      y: 0.0
      size: 1.5
