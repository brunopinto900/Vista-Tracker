base: ../base.yaml

# Scenario: Urban Block
# Six building-sized obstacles scattered across a 70x50m area.
# Target weaves between them using sharp lateral changes, forcing
# the planner to replan repeatedly as the drone's line of sight changes.

sim:
  T: 60.0

drone_init:
  x: -8.0
  y:  0.0
  z:  4.0

controller:
  kp_pos:           2.0    # ≈ old kp/kv; re-tune with: python3 scripts/tune_pid.py urban_block
  kp_vel:           5.0
  ki_vel:           0.25
  desired_distance: 4.0
  attitude_kp:      6.680
  yaw_kp:           0.287

target_trajectory:
  type: person
  max_accel: 1.5
  max_speed: 2.0
  max_lateral_accel: 6.0
  loop: false
  waypoints:
    - pos: [  0.0,   0.0, 0.0]
      speed: 2.0
    - pos: [ 12.0, -13.0, 0.0]   # pass south of block A pair (slope keeps y<-10.5 at x=11.5)
      speed: 1.5
    - pos: [ 20.0, -13.0, 0.0]   # clear block A eastern edge before turning north
      speed: 1.5
    - pos: [ 20.0,   6.0, 0.0]   # swing north at x=20, west of block B (x=[23.5,32.5])
      speed: 2.0
    - pos: [ 35.0,   6.0, 0.0]   # east above block B (y=6 > top edge 4.5)
      speed: 2.0
      hold: 3.0                   # pause — simulates pedestrian stopping
    - pos: [ 38.0,   0.0, 0.0]   # drop to y=0 at x=38, just west of block C (x=[38.5,45.5])
      speed: 1.5
    - pos: [ 50.0,   0.0, 0.0]   # thread block C gap at y=0 (gap is y=[-4.5,+4.5])
      speed: 2.0
    - pos: [ 55.0,   5.0, 0.0]   # clear run to exit, above block D (y=[-7.5,-2.5])
      speed: 2.5

world:
  grid:
    x_min: -15.0
    x_max:  65.0
    y_min: -25.0
    y_max:  25.0
  obstacles:
    # Block A — left pair
    - {x: 15.0, y: -7.0, size: 3.5}
    - {x: 15.0, y:  7.0, size: 3.5}
    # Block B — centre blocker
    - {x: 28.0, y:  0.0, size: 4.5}
    # Block C — right pair
    - {x: 42.0, y: -8.0, size: 3.5}
    - {x: 42.0, y:  8.0, size: 3.5}
    # Block D — late funnel
    - {x: 54.0, y: -5.0, size: 2.5}

planner:
  standoff_dist:    4.0    # desired distance from target (m) — matches controller.desired_distance
  wp_reach_thresh:  0.5    # advance to next waypoint when drone is within this radius (m)
  replan_goal_dist: 4.0    # trigger replan when standoff goal shifts more than this (m)
  rrrt:
    step_size:     0.804
    goal_bias:     0.102
    safety_margin: 0.300
    edge_check_res: 0.1    # collision-check sample spacing along edge (m)
    max_iter:       4000   # RRT iteration budget per replan call
    goal_tol:       0.5    # goal-reached radius (m)