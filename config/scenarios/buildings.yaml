base: ../base.yaml

# Scenario: buildings
# Person walks an L-shaped urban route, slows at corners, stops at a junction.

drone_init:
  x: -5.0
  y:  2.0
  z:  3.0

sim:
  T: 60.0

controller:
  kp_pos: 1.6
  kp_vel: 5.0
  ki_vel: 0.2

target_trajectory:
  type: person
  max_accel:         0.8
  max_speed:         2.0
  max_lateral_accel: 4.0
  loop: false
  waypoints:
    - pos: [0.0,  2.0, 0.0]
      speed: 1.5
    - pos: [3.5,  2.0, 0.0]
      speed: 0.4
      hold: 0.5
    - pos: [3.5, -2.0, 0.0]
      speed: 1.2
    - pos: [ 7.0, -2.0, 0.0]
      speed: 0.0
      hold: 2.0
    - pos: [11.0, -2.0, 0.0]
      speed: 2.0
    - pos: [18.0, -2.0, 0.0]    # second turn — north
      speed: 0.4
      hold: 0.5
    - pos: [18.0,  5.0, 0.0]
      speed: 1.5
    - pos: [25.0,  5.0, 0.0]    # junction — stop briefly
      speed: 0.0
      hold: 2.0
    - pos: [28.0,  0.0, 0.0]
      speed: 2.0

world:
  grid:
    x_min:  -8.0
    x_max:  32.0
    y_min:  -8.0
    y_max:  10.0
  obstacles:
    # Original block
    - {x:  1.5, y:  4.5, size: 1.2}
    - {x:  5.0, y:  0.0, size: 1.0}
    - {x:  4.0, y:  6.0, size: 1.5}
    - {x:  8.5, y:  4.0, size: 1.3}
    # Extended block
    - {x: 14.0, y:  3.0, size: 1.5}
    - {x: 21.0, y: -4.0, size: 1.2}
    - {x: 23.0, y:  2.0, size: 1.0}
    - {x: 27.0, y:  7.0, size: 1.3}
