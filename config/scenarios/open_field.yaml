base: ../base.yaml

# Scenario: Open Field
# Baseline — no obstacles. Target walks a wide Z-pattern across a 60x40m field.
# Use this to verify pure tracking performance before introducing obstacles.

sim:
  T: 90.0

drone_init:
  x: -10.0
  y: -15.0
  z:  4.0

controller:
  desired_distance: 8.0

target_trajectory:
  type: person
  max_accel: 1.5
  max_speed: 2.5
  max_lateral_accel: 5.0
  loop: false
  waypoints:
    - pos: [  0.0, -15.0, 0.0]
      speed: 2.5
    - pos: [ 35.0, -15.0, 0.0]
      speed: 2.5
    - pos: [ 35.0,  15.0, 0.0]
      speed: 2.0
    - pos: [  0.0,  15.0, 0.0]
      speed: 2.5
    - pos: [ 45.0,   0.0, 0.0]
      speed: 2.5

world:
  grid:
    x_min: -15.0
    x_max:  55.0
    y_min: -25.0
    y_max:  25.0
  obstacles: []
