base: ../base.yaml

# Scenario: corridor (forest-like)
# Person moves through a natural tree corridor at varying speeds.

drone_init:
  x: -5.0
  y:  0.0
  z:  2.0

sim:
  T: 45.0

controller:
  kp: 1.5
  ki: 0.1
  kd: 0.4

target_trajectory:
  type: person
  max_accel:         1.2
  max_speed:         2.0
  max_lateral_accel: 4.0
  loop: false
  waypoints:
    - pos: [0.0,  0.0, 0.0]
      speed: 0.6
    - pos: [4.0,  0.0, 0.0]
      speed: 2.0
    - pos: [9.0,  0.0, 0.0]
      speed: 2.0
    - pos: [13.0, 0.0, 0.0]
      speed: 0.5
      hold: 1.0
    - pos: [18.0, 0.0, 0.0]
      speed: 2.0
    - pos: [26.0, 0.0, 0.0]
      speed: 2.0
    - pos: [34.0, 0.0, 0.0]
      speed: 1.5

world:
  grid:
    x_min:  -8.0
    x_max:  38.0
    y_min:  -8.0
    y_max:   8.0
  obstacles:
    # North tree-line
    - {x:  0.5, y:  3.5, size: 0.40}
    - {x:  2.5, y:  4.0, size: 0.50}
    - {x:  5.0, y:  3.5, size: 0.40}
    - {x:  7.5, y:  4.2, size: 0.45}
    - {x:  9.5, y:  3.6, size: 0.50}
    - {x: 12.0, y:  3.8, size: 0.40}
    - {x: 14.5, y:  3.5, size: 0.45}
    - {x: 17.0, y:  3.8, size: 0.45}
    - {x: 19.5, y:  4.0, size: 0.40}
    - {x: 22.0, y:  3.6, size: 0.50}
    - {x: 24.5, y:  4.1, size: 0.40}
    - {x: 27.0, y:  3.8, size: 0.45}
    - {x: 29.5, y:  4.0, size: 0.40}
    - {x: 32.0, y:  3.5, size: 0.50}
    # South tree-line
    - {x:  0.8, y: -3.5, size: 0.45}
    - {x:  3.0, y: -4.0, size: 0.40}
    - {x:  5.5, y: -3.6, size: 0.50}
    - {x:  8.0, y: -3.5, size: 0.40}
    - {x: 10.5, y: -4.1, size: 0.45}
    - {x: 13.0, y: -3.7, size: 0.40}
    - {x: 15.0, y: -3.5, size: 0.50}
    - {x: 17.5, y: -3.8, size: 0.40}
    - {x: 20.0, y: -4.0, size: 0.50}
    - {x: 22.5, y: -3.6, size: 0.40}
    - {x: 25.0, y: -4.1, size: 0.45}
    - {x: 27.5, y: -3.7, size: 0.40}
    - {x: 30.0, y: -3.9, size: 0.50}
    - {x: 32.5, y: -3.5, size: 0.45}
