base: ../base.yaml

# Scenario: corridor (forest-like)
# Person moves through a natural tree corridor at varying speeds.

drone_init:
  x: -5.0
  y:  0.0
  z:  2.0

sim:
  T: 20.0

controller:
  kp: 1.5
  ki: 0.1
  kd: 0.4

target_trajectory:
  type: person
  max_accel:         1.2
  max_speed:         2.0
  max_lateral_accel: 4.0
  loop: false
  waypoints:
    - pos: [0.0,  0.0, 0.0]
      speed: 0.6
    - pos: [4.0,  0.0, 0.0]
      speed: 2.0
    - pos: [9.0,  0.0, 0.0]
      speed: 2.0
    - pos: [13.0, 0.0, 0.0]
      speed: 0.5
      hold: 1.0
    - pos: [18.0, 0.0, 0.0]
      speed: 2.0

world:
  grid:
    x_min: -6.0
    x_max:  20.0
    y_min:  -6.0
    y_max:   6.0
  obstacles:
    - x:  0.5
      y:  3.5
      size: 0.4
    - x:  2.5
      y:  4.0
      size: 0.5
    - x:  5.0
      y:  3.5
      size: 0.4
    - x:  7.5
      y:  4.2
      size: 0.45
    - x:  9.5
      y:  3.6
      size: 0.5
    - x: 12.0
      y:  3.8
      size: 0.4
    - x: 14.5
      y:  3.5
      size: 0.45
    - x:  0.8
      y: -3.5
      size: 0.45
    - x:  3.0
      y: -4.0
      size: 0.4
    - x:  5.5
      y: -3.6
      size: 0.5
    - x:  8.0
      y: -3.5
      size: 0.4
    - x: 10.5
      y: -4.1
      size: 0.45
    - x: 13.0
      y: -3.7
      size: 0.4
    - x: 15.0
      y: -3.5
      size: 0.5
