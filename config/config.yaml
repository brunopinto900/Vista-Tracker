# Default scenario: open field, person walking at constant velocity.
# Self-contained — no base: reference.
# Used by ./tracker with no arguments.

drone_init:
  x: -8.0
  y:  0.0
  z:  2.0

target_trajectory:
  type:              person
  max_accel:         1.2
  max_speed:         2.0
  max_lateral_accel: 4.0
  loop: false
  waypoints:
    - pos: [0.0,   0.0, 0.0]
      speed: 1.0
    - pos: [100.0, 0.0, 0.0]
      speed: 1.0

sim:
  dt: 0.05
  T:  10.0

estimator:
  horizon:      10
  motion_model: CV

controller:
  kp:               1.0
  ki:               0.2
  kd:               0.2
  desired_distance: 4.0

world:
  grid:
    x_min: -12.5
    x_max:  12.5
    y_min: -12.5
    y_max:  12.5
  obstacles: []
