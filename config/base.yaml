# Algorithm parameters — scenario-independent.
# Scenarios inherit from this via "base: ../base.yaml".
# World, drone_init, target_trajectory, and sim.T live in the scenario.

drone:
  wn:   25.0            # body-rate natural frequency (rad/s) — typical small quad
  zeta:  0.7            # damping ratio (0.7 → 4.3 % overshoot, settles in ~330 ms)

sim:
  dt: 0.05              # timestep — same for all scenarios

estimator:
  horizon:      10
  motion_model: CV      # CV | CTRV | CA

controller:
  kp:               6.0    # ITAE+smoothing-optimised for sinusoidal tracking
  ki:               0.0
  kd:               3.0
  desired_distance: 4.0
  attitude_kp:      8.7    # inner loop gain (rad/s per rad); smoothing pulled this down from 16.5
