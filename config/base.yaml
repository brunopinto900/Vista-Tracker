# Algorithm parameters — scenario-independent.
# Scenarios inherit from this via "base: ../base.yaml".
# World, drone_init, target_trajectory, and sim.T live in the scenario.

drone:
  wn:       25.0   # roll/pitch natural frequency (rad/s) — differential thrust
  zeta:      0.7   # damping ratio (0.7 → 4.3 % overshoot, settles in ~330 ms)
  wn_yaw:    4.0   # yaw natural frequency (rad/s) — reaction torque limited (τ≈250 ms)
  zeta_yaw:  0.7

sim:
  dt: 0.05              # timestep — same for all scenarios

camera:
  fov:   360.0           # horizontal field of view (degrees) — omnidirectional obstacle sensing
  range:   8.0           # sensing/detection range (metres)

tracking_camera:
  fov:    60.0           # horizontal field of view (degrees) — tracking camera (±30°)
  # vfov is derived from fov for a 16:9 sensor: atan(tan(fov/2) * 9/16) ≈ ±18°

target:
  height:    1.80        # m — person total height
  width:     0.50        # m — shoulder width (physical extent used for occlusion)
  track_z:   0.90        # m — camera aim point (vertical centre of person = height/2)

estimator:
  horizon:      10
  motion_model: CV      # CV | CTRV | CA

controller:
  kp_pos:                1.6    # outer position loop P gain (pos error → vel setpoint)
  ki_pos:                0.0    # outer position loop I gain (eliminates pos steady-state error)
  kp_vel:                5.0    # inner velocity loop P gain (vel error → acceleration)
  ki_vel:                0.2    # inner velocity loop I gain (eliminates steady-state vel error)
  attitude_kp:           6.680  # roll/pitch inner loop (rad/s per rad); wn=25 rad/s plant
  yaw_kp:                0.287  # yaw inner loop (rad/s per rad); wn=4 rad/s plant (reaction torque limited)
  max_tilt_rad:          0.5    # roll/pitch tilt ceiling (rad, ~28°)
  max_thrust:            2.0    # normalised thrust ceiling
  max_ipos_contribution: 1.0    # max position-integral contribution to vel setpoint (m/s)
  max_ivel_contribution: 4.0    # max velocity-integral contribution to acceleration (m/s²)

planner:
  # standoff_dist is computed at runtime from bounding-box FOV geometry; not a YAML key.
  wp_reach_thresh:  0.5    # advance to next waypoint when drone is within this radius (m)
  replan_goal_dist: 4.0    # trigger replan when standoff goal shifts more than this (m)
  theta_des:        13.0    # desired viewing angle of target below horizon (degrees)
  theta_safe:       5.0    # FOV safety margin — 5° above head and 5° between ground_strip and bottom of frame
  min_z:            2.0    # altitude floor (m) — clearance above person height (1.80 m)
  ground_strip:     0.30   # ground visible below feet (m) — forces wider standoff to guarantee this strip
  path_resample_step: 0.2  # 0.15 Catmull-Rom arc-length step (m); set 0 to disable smoothing
  rrt:
    step_size:      0.8    # RRT extension step (m)
    goal_bias:      0.10   # fraction of samples directed at goal
    safety_margin:  0.5    # min clearance from obstacle surface (m)
    edge_check_res: 0.1    # collision-check sample spacing along edge (m)
    max_iter:       4000   # RRT iteration budget per replan call
    goal_tol:       0.5    # goal-reached radius (m)
