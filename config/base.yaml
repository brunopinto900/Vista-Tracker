# Algorithm parameters — scenario-independent.
# Scenarios inherit from this via "base: ../base.yaml".
# World, drone_init, target_trajectory, and sim.T live in the scenario.

drone:
  tau: 0.02             # body-rate actuator lag (s) — PX4 inner-loop typically 15–30 ms

sim:
  dt: 0.05              # timestep — same for all scenarios

estimator:
  horizon:      10
  motion_model: CV      # CV | CTRV | CA

controller:
  kp:               1.0
  ki:               0.2
  kd:               0.2
  desired_distance: 4.0
  attitude_kp:      5.0  # inner loop gain (rad/s per rad)
